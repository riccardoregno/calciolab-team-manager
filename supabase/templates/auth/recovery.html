<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reimposta la password CalcioLab</title>
  </head>
  <body style="margin:0;background:#0b1118;font-family:Inter,Arial,sans-serif;color:#e5edf8;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#0b1118;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#111827;border:1px solid #223047;border-radius:18px;overflow:hidden;">
            <tr>
              <td style="padding:28px 28px 18px;border-bottom:1px solid #223047;">
                <div style="font-size:24px;font-weight:900;color:#ffffff;">CalcioLab</div>
                <div style="margin-top:6px;font-size:13px;font-weight:700;color:#8fb4ff;">Coach Platform</div>
              </td>
            </tr>
            <tr>
              <td style="padding:30px 28px;">
                <h1 style="margin:0 0 12px;font-size:24px;line-height:1.25;color:#ffffff;">Reimposta la password</h1>
                <p style="margin:0 0 18px;font-size:15px;line-height:1.7;color:#b7c4d8;">
                  Abbiamo ricevuto una richiesta di reset password per il tuo account CalcioLab.
                </p>
                <table role="presentation" cellspacing="0" cellpadding="0" style="margin:28px 0;">
                  <tr>
                    <td style="border-radius:12px;background:#3b82f6;">
                      <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 22px;color:#ffffff;text-decoration:none;font-size:15px;font-weight:900;">
                        Scegli nuova password
                      </a>
                    </td>
                  </tr>
                </table>
                <p style="margin:0;font-size:13px;line-height:1.6;color:#94a3b8;">
                  Se non hai richiesto tu il reset, puoi ignorare questa email.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 28px;background:#0f1724;border-top:1px solid #223047;font-size:12px;line-height:1.6;color:#73839a;">
                Link valido per un tempo limitato per motivi di sicurezza.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
