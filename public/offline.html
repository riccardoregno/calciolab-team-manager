<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#080b12">
  <title>Offline — CalcioLab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080b12;
      color: #f0f4ff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      margin: 0 auto 24px;
      box-shadow: 0 0 40px rgba(37,99,235,0.35);
    }

    h1 {
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 900;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    p {
      font-size: 15px;
      color: #94a3b8;
      line-height: 1.65;
      max-width: 360px;
      margin: 0 auto 28px;
    }

    .wifi-icon {
      font-size: 56px;
      margin-bottom: 20px;
      opacity: 0.7;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      text-decoration: none;
      font-size: 15px;
      font-weight: 800;
      padding: 13px 28px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: 0.85; }

    .hint {
      margin-top: 20px;
      font-size: 13px;
      color: #334155;
    }

    /* Pulsante ricarica con animazione */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; animation: spin 1s linear infinite; }
  </style>
</head>
<body>
  <div class="wifi-icon">📡</div>
  <div class="logo">⚡</div>
  <h1>Sei offline</h1>
  <p>
    Controlla la connessione internet e riprova.<br>
    I dati salvati in locale sono comunque accessibili.
  </p>

  <button class="btn" id="retry-btn" onclick="retryConnection()">
    ⟳ Riprova
  </button>

  <p class="hint">
    CalcioLab · <a href="mailto:info@calciolab.org" style="color:#475569;">Supporto</a>
  </p>

  <script>
    // FIX: questa pagina può essere mostrata da un service worker OBSOLETO
    // (precedente al deploy con selfDestroying:true) che intercetta la
    // navigazione (es. /join?token=xxx, link invito) e serve offline.html
    // dalla cache anche quando la rete è disponibile. Per auto-ripararsi:
    // disregistriamo qualsiasi SW residuo e svuotiamo le cache, poi
    // ricarichiamo la pagina ORIGINALE (window.location.href mantiene il
    // path/query richiesto, es. /join?token=xxx — non torniamo a "/" per
    // non perdere il token di invito).
    async function unregisterStaleServiceWorkers() {
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((r) => r.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
      } catch (e) {
        // best-effort: se fallisce, l'utente può comunque premere "Riprova"
      }
    }

    function reloadCurrentPage() {
      // location.reload() non basta dopo unregister di un SW che ha già
      // intercettato la navigazione: forziamo una ricarica "pulita" dello
      // stesso URL (path + query, incluso eventuale ?token=xxx).
      window.location.replace(window.location.href);
    }

    function retryConnection() {
      const btn = document.getElementById('retry-btn');
      btn.innerHTML = '<span class="spinner">⟳</span> Connessione…';
      btn.disabled = true;

      unregisterStaleServiceWorkers().finally(() => {
        setTimeout(() => {
          reloadCurrentPage();
        }, 800);
      });
    }

    // Al caricamento ripuliamo sempre eventuali SW/cache obsolete. Alcuni
    // browser mobile/PWA possono riportare navigator.onLine=false anche con
    // rete disponibile, quindi non ci basiamo su quel flag per riparare.
    const AUTO_REPAIR_KEY = 'calciolab-offline-auto-repair-v1';
    if (!sessionStorage.getItem(AUTO_REPAIR_KEY)) {
      sessionStorage.setItem(AUTO_REPAIR_KEY, '1');
      unregisterStaleServiceWorkers().then(() => {
        setTimeout(reloadCurrentPage, 800);
      });
    }

    // Auto-ricarica quando torna la connessione
    window.addEventListener('online', () => {
      unregisterStaleServiceWorkers().finally(reloadCurrentPage);
    });
  </script>
</body>
</html>
