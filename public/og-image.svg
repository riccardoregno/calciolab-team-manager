<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080b12"/>
      <stop offset="100%" stop-color="#0d1220"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <clipPath id="cardClip">
      <rect x="640" y="100" width="480" height="430" rx="24"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- ── Left side: brand + copy ── -->

  <!-- Logo bolt -->
  <rect x="80" y="100" width="62" height="62" rx="16" fill="url(#bolt)"/>
  <text x="111" y="143" text-anchor="middle" font-size="32" font-family="Arial">⚡</text>

  <!-- CalcioLab wordmark -->
  <text x="158" y="143" font-family="Inter,Arial,sans-serif" font-size="32" font-weight="900" fill="white">CalcioLab</text>

  <!-- Eyebrow badge -->
  <rect x="80" y="196" width="228" height="30" rx="15" fill="rgba(37,99,235,0.15)" stroke="rgba(96,165,250,0.3)" stroke-width="1"/>
  <text x="194" y="216" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="12" font-weight="700" fill="#93c5fd" letter-spacing="1">⚽  GESTIONALE CALCIO</text>

  <!-- Main headline -->
  <text x="80" y="290" font-family="Inter,Arial,sans-serif" font-size="52" font-weight="900" fill="white">Gestisci rosa, staff</text>

  <!-- Gradient headline line 2 -->
  <text x="80" y="355" font-family="Inter,Arial,sans-serif" font-size="52" font-weight="900" fill="url(#accent)">e stagione.</text>

  <!-- Subtitle -->
  <text x="80" y="410" font-family="Inter,Arial,sans-serif" font-size="18" fill="#64748b">Allenamenti · Gare · Convocazioni · Statistiche</text>
  <text x="80" y="438" font-family="Inter,Arial,sans-serif" font-size="18" fill="#64748b">Tutto il lavoro della squadra in un'unica piattaforma.</text>

  <!-- CTA pill -->
  <rect x="80" y="475" width="220" height="52" rx="14" fill="url(#btnGrad)"/>
  <text x="190" y="507" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="800" fill="white">Apri CalcioLab →</text>

  <!-- "Gratis per iniziare" note -->
  <text x="80" y="552" font-family="Inter,Arial,sans-serif" font-size="13" fill="#334155">Per allenatori, preparatori e staff tecnico</text>

  <!-- ── Right side: mock dashboard card ── -->
  <rect x="640" y="100" width="480" height="430" rx="24" fill="rgba(15,17,21,0.96)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Card top bar -->
  <rect x="640" y="100" width="480" height="44" rx="0" fill="rgba(255,255,255,0.04)"/>
  <rect x="640" y="100" width="480" height="44" rx="24" fill="rgba(255,255,255,0.04)"/>
  <rect x="640" y="122" width="480" height="22" fill="rgba(255,255,255,0.04)"/>
  <!-- Traffic lights -->
  <circle cx="673" cy="122" r="6" fill="#f87171"/>
  <circle cx="695" cy="122" r="6" fill="#fbbf24"/>
  <circle cx="717" cy="122" r="6" fill="#4ade80"/>
  <!-- URL bar -->
  <rect x="760" y="112" width="240" height="20" rx="6" fill="rgba(255,255,255,0.05)"/>
  <text x="880" y="126" text-anchor="middle" font-family="monospace" font-size="10" fill="#334155">calciolab.org/dashboard</text>

  <!-- KPI row -->
  <g transform="translate(660, 165)">
    <!-- KPI 1 -->
    <rect x="0" y="0" width="96" height="70" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <text x="10" y="18" font-family="Inter,Arial,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="0.5">GIOCATORI</text>
    <text x="10" y="52" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="900" fill="#38bdf8">24</text>
    <!-- KPI 2 -->
    <rect x="108" y="0" width="96" height="70" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <text x="118" y="18" font-family="Inter,Arial,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="0.5">PARTITE</text>
    <text x="118" y="52" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="900" fill="#4ade80">18</text>
    <!-- KPI 3 -->
    <rect x="216" y="0" width="96" height="70" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <text x="226" y="18" font-family="Inter,Arial,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="0.5">GOL FATTI</text>
    <text x="226" y="52" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="900" fill="#a78bfa">34</text>
    <!-- KPI 4 -->
    <rect x="324" y="0" width="96" height="70" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    <text x="334" y="18" font-family="Inter,Arial,sans-serif" font-size="8" font-weight="700" fill="#475569" letter-spacing="0.5">PRESENZE</text>
    <text x="334" y="52" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="900" fill="#fbbf24">87%</text>
  </g>

  <!-- Chart area -->
  <rect x="660" y="258" width="274" height="120" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="673" y="278" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="0.5">ANDAMENTO STAGIONE</text>
  <!-- Bar chart -->
  <g transform="translate(666, 285)">
    <rect x="0"   y="45" width="20" height="35" rx="3" fill="rgba(56,189,248,0.3)"/>
    <rect x="24"  y="30" width="20" height="50" rx="3" fill="rgba(56,189,248,0.4)"/>
    <rect x="48"  y="35" width="20" height="45" rx="3" fill="rgba(56,189,248,0.45)"/>
    <rect x="72"  y="20" width="20" height="60" rx="3" fill="rgba(56,189,248,0.5)"/>
    <rect x="96"  y="25" width="20" height="55" rx="3" fill="rgba(56,189,248,0.55)"/>
    <rect x="120" y="10" width="20" height="70" rx="3" fill="rgba(56,189,248,0.65)"/>
    <rect x="144" y="15" width="20" height="65" rx="3" fill="rgba(56,189,248,0.7)"/>
    <rect x="168" y="5"  width="20" height="75" rx="3" fill="rgba(56,189,248,0.8)"/>
    <rect x="192" y="8"  width="20" height="72" rx="3" fill="rgba(56,189,248,0.85)"/>
    <rect x="216" y="0"  width="20" height="80" rx="3" fill="rgba(56,189,248,0.95)"/>
  </g>

  <!-- Players list -->
  <rect x="948" y="258" width="152" height="120" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="961" y="278" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="0.5">ROSA</text>
  <!-- Player rows -->
  <text x="961" y="302" font-family="Inter,Arial,sans-serif" font-size="11" fill="#94a3b8">Bianchi M.</text>
  <text x="1086" y="302" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#4ade80">Disp.</text>
  <line x1="961" y1="310" x2="1086" y2="310" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="961" y="328" font-family="Inter,Arial,sans-serif" font-size="11" fill="#94a3b8">Rossi F.</text>
  <text x="1086" y="328" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#fbbf24">Indis.</text>
  <line x1="961" y1="336" x2="1086" y2="336" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="961" y="354" font-family="Inter,Arial,sans-serif" font-size="11" fill="#94a3b8">Verdi L.</text>
  <text x="1086" y="354" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" fill="#4ade80">Disp.</text>

  <!-- Bottom row: next training -->
  <rect x="660" y="394" width="440" height="116" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="673" y="416" font-family="Inter,Arial,sans-serif" font-size="9" font-weight="700" fill="#475569" letter-spacing="0.5">PROSSIMO ALLENAMENTO</text>
  <rect x="673" y="426" width="6" height="46" rx="3" fill="#2563eb"/>
  <text x="688" y="447" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" fill="white">Giovedì 26 mag · 18:30</text>
  <text x="688" y="465" font-family="Inter,Arial,sans-serif" font-size="12" fill="#64748b">Tecnica + possesso palla · Campo A · 21 convocati</text>
  <!-- Attendance bar -->
  <rect x="673" y="480" width="414" height="8" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="673" y="480" width="360" height="8" rx="4" fill="url(#btnGrad)"/>
  <text x="1092" y="489" text-anchor="end" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#64748b">87%</text>

  <!-- Bottom border accent -->
  <rect x="640" y="524" width="480" height="6" rx="0" fill="url(#bolt)"/>
  <rect x="640" y="524" width="480" height="6" rx="0" fill="url(#bolt)"/>
  <rect x="640" y="524" width="480" height="12" rx="0" fill="rgba(0,0,0,0)"/>
</svg>
